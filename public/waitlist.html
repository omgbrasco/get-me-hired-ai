<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join the Waitlist — Get Me Hired AI</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .waitlist-form {
        display: grid;
        gap: 16px;
        margin-top: 28px;
      }

      .tier-selector {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .tier-option {
        position: relative;
      }

      .tier-option input[type="radio"] {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
      }

      .tier-option label {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 14px 12px;
        border-radius: 16px;
        border: 1.5px solid rgba(49, 41, 30, 0.14);
        background: var(--input);
        cursor: pointer;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text);
        transition: border-color 140ms ease, background 140ms ease;
        text-align: center;
      }

      .tier-option label .tier-price {
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--muted);
        margin: 0;
      }

      .tier-option input[type="radio"]:checked + label {
        border-color: var(--accent);
        background: rgba(47, 106, 86, 0.07);
        color: var(--accent-strong);
      }

      .tier-option label:hover {
        border-color: rgba(47, 106, 86, 0.4);
      }

      #submit-waitlist {
        background: var(--accent);
        color: #fff;
        margin-top: 4px;
        width: 100%;
      }

      /* Success state */
      .success-box {
        margin-top: 28px;
        padding: 24px 20px;
        border-radius: 20px;
        background: rgba(47, 106, 86, 0.08);
        border: 1px solid rgba(47, 106, 86, 0.18);
        text-align: center;
      }

      .success-box .success-icon {
        font-size: 2rem;
        line-height: 1;
        margin-bottom: 12px;
      }

      .success-box h3 {
        margin: 0 0 8px;
        font-size: 1.1rem;
        color: var(--text);
      }

      .success-box p {
        margin: 0;
        font-size: 0.9rem;
        color: var(--muted);
        line-height: 1.6;
      }

      .success-box[hidden] { display: none; }

      .form-message {
        min-height: 20px;
        font-size: 0.9rem;
        color: #a13f2d;
        margin-top: 4px;
      }

      .back-link {
        display: inline-block;
        margin-top: 28px;
        font-size: 0.875rem;
        color: var(--muted);
        text-decoration: none;
      }

      .back-link:hover { color: var(--accent); }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <section class="card">
        <div class="eyebrow">Get Me Hired AI</div>
        <h1>Join the waitlist.</h1>
        <p class="intro">Be first to know when Pro and Premium launch. No spam, no commitment.</p>

        <form id="waitlist-form" class="waitlist-form">
          <label class="field">
            <span>Name</span>
            <input type="text" id="name" placeholder="Your name" autocomplete="name" maxlength="120" required />
          </label>

          <label class="field">
            <span>Email</span>
            <input type="email" id="email" placeholder="you@email.com" autocomplete="email" maxlength="200" required />
          </label>

          <div class="field">
            <span>Interested tier</span>
            <div class="tier-selector">
              <div class="tier-option">
                <input type="radio" name="tier" id="tier-pro" value="pro" />
                <label for="tier-pro">
                  Pro
                  <span class="tier-price">$19 / mo</span>
                </label>
              </div>
              <div class="tier-option">
                <input type="radio" name="tier" id="tier-premium" value="premium" />
                <label for="tier-premium">
                  Premium
                  <span class="tier-price">$49 / mo</span>
                </label>
              </div>
            </div>
          </div>

          <label class="field">
            <span>Anything you want us to know? <small>(optional)</small></span>
            <textarea id="note" rows="3" maxlength="500" placeholder="What matters most to you in a job search tool?"></textarea>
          </label>

          <p id="form-error" class="form-message" aria-live="polite"></p>

          <button id="submit-waitlist" type="submit">Join the waitlist</button>
        </form>

        <div id="success-box" class="success-box" hidden>
          <div class="success-icon">🎉</div>
          <h3>You're on the list.</h3>
          <p>We'll reach out when your tier launches. Thanks for your interest.</p>
        </div>

        <a href="/pricing.html" class="back-link">← Back to pricing</a>
      </section>
    </main>

    <script>
      // Pre-select tier from URL param
      const params = new URLSearchParams(window.location.search);
      const tierParam = params.get("tier");
      if (tierParam === "pro" || tierParam === "premium") {
        const radio = document.getElementById(`tier-${tierParam}`);
        if (radio) radio.checked = true;
      }

      const form      = document.getElementById("waitlist-form");
      const btn       = document.getElementById("submit-waitlist");
      const errMsg    = document.getElementById("form-error");
      const successBox = document.getElementById("success-box");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errMsg.textContent = "";

        const name  = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const note  = document.getElementById("note").value.trim();
        const tierEl = document.querySelector('input[name="tier"]:checked');

        if (!tierEl) {
          errMsg.textContent = "Please select a tier.";
          return;
        }

        btn.disabled = true;
        btn.textContent = "Submitting…";

        try {
          const res  = await fetch("/api/waitlist", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, tier: tierEl.value, note }),
          });
          const data = await res.json();

          if (!res.ok || !data.success) {
            throw new Error(data.message || "Something went wrong.");
          }

          form.hidden = true;
          successBox.hidden = false;
        } catch (err) {
          errMsg.textContent = err.message;
          btn.disabled = false;
          btn.textContent = "Join the waitlist";
        }
      });
    </script>
  </body>
</html>
